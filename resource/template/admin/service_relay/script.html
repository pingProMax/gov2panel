<!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="/resource/css/bootstrap-table.min.css" type="text/css">

<!-- Latest compiled and minified JavaScript -->
<script src="/resource/js/bootstrap-table.min.js"></script>
<!-- Latest compiled and minified Locales -->
<script src="/resource/js/bootstrap-table-zh-CN.min.js"></script>


<!-- Latest compiled and minified CSS -->
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">

<!-- Latest compiled and minified JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>


<div id="toolbar">
  <div class="btn-group ml-3" role="group" aria-label="Basic example">
    <button type="button" class="btn btn-info " onclick="AE()">添加</button>
    <button type="button" class="btn btn-primary " onclick="CopyNode()">复制</button>
    <button type="button" class="btn btn-primary " onclick="UpShow(1)">启用</button>
    <button type="button" class="btn btn-primary " onclick="UpShow(-1)">停用</button>
    <button type="button" class="btn btn-danger " onclick="Del()">删除</button>
  </div>
</div>

<div class="modal fade bd-example-modal-lg" id="AEModal" tabindex="-1" aria-labelledby="myLargeModalLabel"
  aria-hidden="true" style="display: none;">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="AEModalLongTitle">编辑</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="modal-body">
        <form id="AEForm">
          <input name="id" id="aeid" type="hidden">
          <div class="row">

            <div class="col">
              <div class="position-relative form-group">
                <label>组名字</label>
                <input name="name_group" placeholder="组名字" type="text" class="form-control">
              </div>
            </div>

            <div class="col">
              <div class="position-relative form-group">
                <label>订阅解析模式</label>
                <select name="resolve_mode" class="form-control" data-style="btn-primary">
                  multiple="multiple" data-none-selected-text="请选择">
                  <option value="Unchanged">原始</option>
                  <option value="DNS_Random">解析</option>
                  <option value="DNS_Ipv4">解析ipv4</option>
                  <option value="DNS_Ipv6">解析ipv6</option>
                </select>
              </div>
            </div>
            

            <div class="col">
              <div class="position-relative form-group">
                <label>启用状态</label>
                <div>
                  <div class="custom-control custom-radio ">
                    <input name="show" class="custom-control-input" id="customRadioShow" type="radio" checked=""
                      value="1">
                    <label class="custom-control-label" for="customRadioShow">启用</label>
                  </div>
                  <div class="custom-control custom-radio ">
                    <input name="show" class="custom-control-input" id="customRadioNoShow" type="radio" value="-1">
                    <label class="custom-control-label" for="customRadioNoShow">停用</label>
                  </div>
                </div>

              </div>
            </div>

          </div>

          <div class="row">
            <div class="col">
              <div class="position-relative form-group">
                <label>ASN</label>
                <input name="asn" placeholder="ASN" type="text" class="form-control">
              </div>
            </div>
            <div class="col">
              <div class="position-relative form-group">
                <label>顺序</label>
                <input name="order_id" placeholder="顺序" type="number" class="form-control">
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col">
              <div class="position-relative form-group">
                <label>IP</label>
                <textarea name="ip" class="form-control" rows="5" placeholder="一行一个可以批量添加"></textarea>
              </div>
            </div>

            <div class="col">
              <div class="position-relative form-group">
                <label>备注</label>
                <textarea name="remarks" class="form-control" rows="5" placeholder="备注"></textarea>
              </div>
            </div>

          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="AEajax()">保存</button>
      </div>
    </div>
  </div>
</div>


<script>
  let onlineUserCountAndLastPushAt;
  let hasInit = false;
  const $table = $('#table')
  $.fn.selectpicker.Constructor.BootstrapVersion = '4';
  $(function () {
    initTable()

  })


  //搜索
  function search() {
    $("#table").bootstrapTable('refresh', { pageNumber: 1 });
  }

  //清除搜索
  function cleanSearch() {
    $("select[data-function='search']").each(function (i, domEle) {
      // 选择第一个选项
      $(this).val($(this).find('option:first').val());
    })
    $("input[data-function='search']").each(function (i, domEle) {
      $(domEle).val("")
    })
    $("#table").bootstrapTable('refresh');
  }

  //AE表单
  function AE(data) {
    $('#AEForm')[0].reset();
    if (data != null) {
      $("#AEModalLongTitle").text("编辑")
      $("#AEForm input[type='hidden'],#AEForm input[type='number'],#AEForm input[type='text'],#AEForm select,#AEForm textarea").each(function (i, v) {
        for (let key in data) {
          if (key == $(v).attr("name")) {
            $(v).val(data[key])
          }
        }
      })

      $("#AEForm input[type='checkbox']").each(function (i, v) {
        for (let key in data) {
          if (key == $(v).attr("name")) {
            if (data[key] == 1) {
              $(v).attr("checked", "true")
            } else {
              $(v).removeAttr("checked")
            }
          }
        }
      })

      //单选默认值
      $("#AEForm input[type='radio']").each(function (i, v) {
        for (let key in data) {
          if (key == $(v).attr("name")) {
            $("#AEForm input:radio[name='" + key + "'][value='" + data[key] + "']").prop("checked", true)
          }
        }
      })

    } else {
      

      $("#AEModalLongTitle").text("添加")
      $("#aeid").val("")

    }
    $('#AEModal').modal('show')
  }

  //ae提交
  function AEajax() {
    let d = {}
    let t = $("#AEForm").serializeArray();
    let planIds = []
    $.each(t, function () {
      d[this.name] = this.value;
    });

    

    $.ajax({
      type: "POST",
      url: "/{{.setting.admin_path}}/service_relay/ae",
      data: d,
      dataType: "json",
      success: function (data) {
        if (data.code == 0) {
          notify('success', "保存成功")
        } else {
          notify('danger', data.message)
        }
      },
      error: function (XMLHttpRequest, textStatus, errorThrown) {
        console.log(errorThrown)
        notify('danger', errorThrown)
      },
      complete: function () {//不管成功还是失败 都会进这个函数
        $('#AEModal').modal('hide')
        $("#table").bootstrapTable('refresh');
      }
    });
  }

  //删除数据
  function Del() {
    let delData = $table.bootstrapTable('getSelections')
    if (delData.length == 0) {
      notify('danger', '请选择！')
      return
    }
    let ids = []
    delData.forEach(function (v, i) {
      ids.push(v.id)
    })

    $.ajax({
      type: "post",
      url: "/{{.setting.admin_path}}/service_relay/del",
      data: { 'ids': ids },
      dataType: "json",
      success: function (data) {
        if (data.code == 0) {
          notify('success', "删除成功")
        } else {
          notify('danger', data.message)
        }
      },
      error: function (XMLHttpRequest, textStatus, errorThrown) {
        notify('danger', errorThrown)
      },
      complete: function () {//不管成功还是失败 都会进这个函数
        $("#table").bootstrapTable('refresh');
      }
    });

  }

  //复制节点
  function CopyNode() {
    let date = $table.bootstrapTable('getSelections')
    if (date.length != 1) {
      notify('danger', '请选择一个节点！')
      return
    }

    let d = date[0]
    
    delete d.id
    delete d.updated_at
    delete d.created_at
    
    $.ajax({
      type: "POST",
      url: "/{{.setting.admin_path}}/service_relay/ae",
      data: d,
      dataType: "json",
      success: function (data) {
        if (data.code == 0) {
          notify('success', "复制成功")
        } else {
          notify('danger', data.message)
        }
      },
      error: function (XMLHttpRequest, textStatus, errorThrown) {
        console.log(errorThrown)
        notify('danger', errorThrown)
      },
      complete: function () {//不管成功还是失败 都会进这个函数
        $("#table").bootstrapTable('refresh');
      }
    });

  }

  //更新服务器显示状态
  function UpShow(show) {
    let delData = $table.bootstrapTable('getSelections')
    if (delData.length == 0) {
      notify('danger', '请选择！')
      return
    }
    let ids = []
    delData.forEach(function (v, i) {
      ids.push(v.id)
    })

    $.ajax({
      type: "post",
      url: "/{{.setting.admin_path}}/service_relay/show",
      data: { 'ids': ids ,'show' :show},
      dataType: "json",
      success: function (data) {
        if (data.code == 0) {
          notify('success', "删除成功")
        } else {
          notify('danger', data.message)
        }
      },
      error: function (XMLHttpRequest, textStatus, errorThrown) {
        notify('danger', errorThrown)
      },
      complete: function () {//不管成功还是失败 都会进这个函数
        $("#table").bootstrapTable('refresh');
      }
    });

  }


  //显示模态框
  function DisplayModal(htmlId) {
    let delData = $table.bootstrapTable('getSelections')
    if (delData.length == 0) {
      notify('danger', '请选择节点！')
      return
    }
    $('#'+htmlId).modal('show')
    $("#limit_plan_id2").selectpicker('val', '');
    $("#limit_route_id2").selectpicker('val', '');
  }



  //初始化表格
  function initTable() {

    $table.bootstrapTable({
      columns: [
        [
          {

          },  {
            title: '<input type="text"  placeholder="ID" class="form-control" name="id" data-function="search" data-type="eq"  />',
          }, {
            title: '<input type="text"  placeholder="IP" class="form-control" name="ip" data-function="search" data-type="like"  />',
          },{
            title: '<input type="text"  placeholder="组名字" class="form-control" name="name_group" data-function="search" data-type="like" />',
          }, {
            title: '<input type="text"  placeholder="ASN" class="form-control" name="asn" data-function="search" data-type="like" />',
          }, {
            title: `
                  <div class="input-group">
                    <select class="custom-select" data-function="search" data-type="eq" name="show">
                      <option selected value="0">全部</option>
                      <option value="1">启用</option>
                      <option value="-1">停用</option>
                    </select>
                  </div>
          `,
          }, {
            title: `
                  <div class="input-group">
                    <select class="custom-select" data-function="search" data-type="eq" name="resolve_mode">
                      <option selected value="">全部</option>
                      <option value="Unchanged">原始</option>
                      <option value="DNS_Random">解析</option>
                      <option value="DNS_Ipv4">解析ipv4</option>
                      <option value="DNS_Ipv6">解析ipv6</option>
                    </select>
                  </div>
          `,
          }, {
          }, {
          }, {
          }, {
            title: `

                  <div class="input-group">
                    <button type="button" class="btn btn-twitter btn-icon-only" onclick="search()">
                      <span class="btn-inner--icon"><i class="fas fa-search"></i></span>
                    </button>
                    <button type="button" class="btn btn-google-plus btn-icon-only" onclick="cleanSearch()">
                      <span class="btn-inner--icon"><i class="fas fa-trash"></i></span>
                    </button>
                  </div>
          `,
          },
        ], [
          {
            checkbox: true,
          }, {
            field: 'id',
            sortName: 'id',
            title: 'ID',
            sortable: true, //是否允许排序
            width: 50,
          },{
            field: 'ip',
            sortName: 'ip',
            title: 'IP',
          }, {
            field: 'name_group',
            sortName: 'name_group',
            title: '组名字',

          }, {
            field: 'asn',
            sortName: 'asn',
            title: 'ASN',
          }, {
            field: 'show',
            sortName: 'show',
            title: '是否启用',
            formatter: function (value, row, index) {
              if (value == -1) {
                return '<span class="text-danger">禁用</span>'; // -1 显示红色字（这里暂定文本为“禁用”，可自行修改）
              } else if (value == 1) {
                return '<span class="text-success">启用</span>'; // 1 显示绿色字
              }
              return value; // 其他值原样返回
            },
          },{
            field: 'resolve_mode',
            sortName: 'resolve_mode',
            title: '解析模式',
            formatter: function (value, row, index) {
              switch (value) {
                case "Unchanged":
                  return '<span class="text-danger">默认</span>'; 
                  break;
                case "DNS_Random":
                  return '<span class="text-success">解析</span>'; 
                  break;
                case "DNS_Ipv4":
                  return '<span class="text-success">解析ipv4</span>'; 
                  break;
                case "DNS_Ipv6":
                  return '<span class="text-success">解析ipv6</span>'; 
                  break;
              }
             
              return value; // 其他值原样返回
            },
          }, {
            field: 'order_id',
            sortName: 'order_id',
            title: '顺序',
            sortable: true, //是否允许排序
          }, {
            field: 'remarks',
            sortName: 'remarks',
            title: '备注',
            // visible: false,//隐藏
          }, {
            field: 'created_at',
            sortName: 'created_at',
            title: '创建时间',
            visible: false,//隐藏
          }, {
            field: 'operate',
            title: '操作',
            width: 120,
            events: {
              'click #edit': function (e, value, row, index) {
                AE(row)
              },
            },
            formatter: function (value, row, index) {
              return `
              <div class="btn-group" role="group" aria-label="Basic example">
                <button id="edit" type="button" class="btn btn-twitter btn-icon-only"><span class="btn-inner--icon"><i class="fas fa-edit"></i></span></button>
              </div>`;
            }
          }
        ]
      ], //列
      url: '/{{.setting.admin_path}}/service_relay',
      method: 'post', //请求方法
      dataType: 'json',//数据格式
      toolbar: '#toolbar',
      pagination: true, //是否显示页码
      sidePagination: "server",//服务器处理分页
      serverSort: "true",//是否服务器处理排序
      sortName: 'order_id',
      sortOrder: 'desc',
      showRefresh: true,  //显示刷新按钮
      showColumns: true, //是否显示列下拉列表按钮
      showFullscreen: true, //是否显示全屏按钮
      responseHandler: function (res) {  //response数据处理
        return {
          "rows": res.data.data,
          "total": res.data.totle,
        };
      },

      //搜索
      queryParams: function (x) {

        $("select[data-function='search']").each(function (i, domEle) {
          x[$(domEle).attr("name")] = domEle.value
        })

        $("input[data-function='search']").each(function (i, domEle) {
          const bindingDomID = $(domEle).attr("data-select-binding")
          if (bindingDomID != undefined) {
            x[$(bindingDomID).attr("name")] = $(bindingDomID).val()
          }
          x[$(domEle).attr("name")] = domEle.value
        })


        return x
      },
      onColumnSwitch: function (field, checked) { //列选择事件
        window.localStorage.setItem('service_relay_hidden_columns', JSON.stringify($("#table").bootstrapTable('getHiddenColumns').map(function (it) { return it.field })))

      },
      onPostBody: function (data) {//渲染并在 DOM 中可用后触发

        if (hasInit == false && window.localStorage.getItem('service_relay_hidden_columns') != null) {
          JSON.parse(window.localStorage.getItem('service_relay_hidden_columns')).forEach(v => {
            $("#table").bootstrapTable('hideColumn', v);
          });
        }
        if (!hasInit) hasInit = true
      },

    })
  }

 

  document.addEventListener('keyup', function (event) {
    if (event.keyCode === 13) {
      // 回车键按下后的操作
      search()
    }
  });


</script>
